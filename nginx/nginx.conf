# ============================================================
# nginx/nginx.conf
# KhadiCraft — Main Nginx reverse proxy
# Serves:  /          → frontend (React SPA on port 3000)
#          /api/*     → backend (PHP-FPM via port 9000)
#          /storage/* → backend public storage
# ============================================================

upstream php_fpm {
    server backend:9000;
}

# Redirect HTTP → HTTPS (comment out if no SSL yet)
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"              always;
    add_header X-XSS-Protection      "1; mode=block"         always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ── Proxy /api → PHP-FPM backend ─────────────────────
    location /api {
        root   /var/www/html/public;
        index  index.php;

        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass         php_fpm;
            fastcgi_index        index.php;
            fastcgi_param        SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
            fastcgi_param        DOCUMENT_ROOT   /var/www/html/public;
            include              fastcgi_params;
            fastcgi_read_timeout 300;
            fastcgi_buffer_size  128k;
            fastcgi_buffers      4 256k;
        }
    }

    # ── Proxy /storage → Laravel public storage ──────────
    location /storage {
        root   /var/www/html/public;
        try_files $uri $uri/ =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── React SPA (all other routes) ─────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Static assets caching ─────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend:80;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Gzip compression ─────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_types      text/plain text/css application/json application/javascript
                    application/x-javascript text/xml application/xml
                    application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary       on;

    client_max_body_size 50M;
    keepalive_timeout    65;
}
