; ============================================================
; docker/php/www.conf — PHP-FPM pool for KhadiCraft
; ============================================================

[www]
user  = www-data
group = www-data

; Listen on TCP (Docker networking)
listen = 0.0.0.0:9000

; Dynamic process manager
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests      = 500

; Slow log
slowlog              = /var/log/php-fpm-slow.log
request_slowlog_timeout = 5s

; Status endpoint (useful for health checks)
pm.status_path = /fpm-status
ping.path       = /fpm-ping

; Capture worker stderr into main error log
catch_workers_output = yes

; Environment variable passing
clear_env = no
