[opcache]
; Enable OPcache
opcache.enable=1
opcache.enable_cli=0

; Memory for cached bytecode
opcache.memory_consumption=256

; Number of strings in the interned-strings buffer
opcache.interned_strings_buffer=32

; Max number of files cached
opcache.max_accelerated_files=20000

; Revalidate every N seconds (0 = never for production)
opcache.revalidate_freq=0
opcache.validate_timestamps=0

; Save comments (required by Laravel annotations/docs)
opcache.save_comments=1

; JIT compilation (PHP 8+)
opcache.jit_buffer_size=100M
opcache.jit=1255
