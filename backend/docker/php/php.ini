; ============================================================
; docker/php/php.ini — Custom PHP settings for KhadiCraft
; ============================================================

; Upload limits (product images, banners, etc.)
upload_max_filesize = 20M
post_max_size       = 25M

; Execution time
max_execution_time  = 120
max_input_time      = 60

; Memory
memory_limit        = 256M

; Error handling (set to Off in production)
display_errors      = Off
log_errors          = On
error_log           = /var/log/php_errors.log

; Timezone
date.timezone       = Asia/Kolkata

; Session
session.gc_maxlifetime = 7200
