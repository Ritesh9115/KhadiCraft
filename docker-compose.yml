# ============================================================
# docker-compose.yml — KhadiCraft by Goldy
# ============================================================
# Services:
#   nginx    → reverse proxy on port 80 (entry point)
#   frontend → React SPA (Vite build served by Nginx)
#   backend  → Laravel 11 API (PHP 8.2 FPM + queue worker)
#
# Database: Aiven PostgreSQL (external cloud, no local DB)
# Storage : Local volume (Laravel public disk)
#
# Usage:
#   Development : docker compose up --build
#   Production  : docker compose -f docker-compose.yml up -d
# ============================================================

version: "3.9"

services:

  # ── Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: khadicraft_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"   # uncomment when adding SSL
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Share backend storage so Nginx can serve /storage/* directly
      - backend_storage:/var/www/html/public/storage:ro
    depends_on:
      - frontend
      - backend
    networks:
      - khadicraft_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Backend API URL seen from the browser (same origin, proxied)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: khadicraft_frontend
    restart: unless-stopped
    networks:
      - khadicraft_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Laravel Backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: khadicraft_backend
    restart: unless-stopped
    expose:
      - "9000"
    env_file:
      - ./backend/.env
    environment:
      # Override for Docker networking
      APP_URL:              ${APP_URL:-http://localhost}
      FRONTEND_URL:         ${FRONTEND_URL:-http://localhost}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost}
      SESSION_DOMAIN:       ${SESSION_DOMAIN:-localhost}
      # Filesystem
      FILESYSTEM_DISK:      local
    volumes:
      # Persist uploaded files (product images, banners, etc.)
      - backend_storage:/var/www/html/storage/app/public
      # Persist log files
      - backend_logs:/var/www/html/storage/logs
    networks:
      - khadicraft_net
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

# ── Volumes ───────────────────────────────────────────────────
volumes:
  backend_storage:
    driver: local
  backend_logs:
    driver: local

# ── Networks ──────────────────────────────────────────────────
networks:
  khadicraft_net:
    driver: bridge
